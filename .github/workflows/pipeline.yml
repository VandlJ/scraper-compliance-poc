name: AI Compliance & Performance Check

on:
  pull_request:
    branches: [ main ]

jobs:
  compliance-audit:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        # We install exactly what we need for the runner
        pip install requests langchain langchain-google-genai langgraph pydantic python-dotenv mcp

    - name: Run Deterministic Test Harness
      run: |
        # Generate metrics.json
        python test_harness/harness.py

    - name: Run AI Agent Reviewer
      env:
        GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
      run: |
        # The agent reads metrics.json and scraper.py and outputs MD comment
        # We capture the output to a file to use it in the next step
        python agent/reviewer.py > reviewer_comment.md

    - name: Post Comment to PR
      if: failure() || success() # Run even if the test harness failed (we want the AI audit)
      uses: thollander/actions-comment-pull-request@v2
      with:
        filePath: reviewer_comment.md