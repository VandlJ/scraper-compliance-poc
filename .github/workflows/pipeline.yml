name: AI Compliance & Performance Check

on:
  pull_request:
    branches: [ main ]

permissions:
  pull-requests: write
  contents: read

jobs:
  compliance-audit:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests langchain langchain-google-genai langgraph pydantic python-dotenv mcp

    - name: Run Deterministic Test Harness
      run: |
        python test_harness/harness.py

    - name: Run AI Agent Reviewer
      env:
        GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
      run: |
        # stderr jde do logu, stdout (Markdown) jde do souboru
        python agent/reviewer.py > reviewer_comment.md

    - name: Post Comment to PR
      if: always() 
      uses: thollander/actions-comment-pull-request@v2
      with:
        filePath: reviewer_comment.md