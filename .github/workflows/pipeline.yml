name: AI Compliance & Performance Check

on:
  pull_request:
    branches: [ main ]

permissions:
  pull-requests: write
  contents: read

jobs:
  compliance-audit:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Step 1 - Generate Compliance PDFs
      run: |
        # Vytvoříme PDFka přímo v runneru, aby je měl Agent k dispozici
        python generate_docs.py

    - name: Step 2 - Run Deterministic Test Harness
      run: |
        # Spustíme testy a vygenerujeme metrics.json
        python test_harness/harness.py

    - name: Step 3 - Run AI Agent Reviewer
      env:
        GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
        PYTHONPATH: .
      run: |
        # Spustíme agenta jako modul a zachytíme výstup
        # Výstupy do stderr uvidíš v logu, stdout se uloží do md
        python -m agent.reviewer > reviewer_comment.md

    - name: Step 4 - Post Comment to PR
      if: always()
      uses: thollander/actions-comment-pull-request@v2
      with:
        filePath: reviewer_comment.md